<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StumbleFeed — Escape your algorithm</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Topbar -->
  <header id="topbar">
    <div class="topbar-left">
      <img src="favicon.svg" alt="" class="logo-img" />
      <div class="logo-block">
        <span class="logo-text">StumbleFeed</span>
        <span class="logo-tagline">Escape your algorithm</span>
      </div>
    </div>
    <div class="topbar-center">
      <button id="new-feed-btn" class="hidden" title="Get a new shuffled feed">🎲 Get New Feed</button>
    </div>
    <div class="topbar-right">
      <div id="source-toggle" class="hidden">
        <button id="src-youtube" class="src-btn active">▶ YouTube</button>
        <button id="src-ru" class="src-btn">VK · RuTube</button>
      </div>
    </div>
  </header>

  <!-- Slogan bar -->
  <div id="slogan-bar" class="hidden">
    Step outside your infobubble, every day. Watch what you choose, not what the algorithm chooses for you.
  </div>

  <!-- Settings toggle -->
  <div id="settings-row" class="hidden">
    <button id="settings-toggle">⚙ Settings <span id="settings-arrow">⌄</span></button>
  </div>

  <!-- Category panel -->
  <div id="category-panel">
    <p class="category-panel-intro">Choose from 20 topics and get a shuffled grid of videos from YouTube without any algorithm</p>
    <div id="category-grid"></div>
  </div>

  <!-- Filters -->
  <div id="filters-row" class="hidden">
    <button id="filters-toggle" class="chip" title="Filter settings">🎛 Filters</button>
    <button class="chip preset-chip" data-preset="rising"
      title="Under 10K views, channels under a year old, last 30 days, by velocity">🌱 Rising</button>
    <button class="chip preset-chip yt-only" data-preset="leaders"
      title="Channels with 100K+ subscribers, by views">👑 Niche Leaders</button>
    <button class="chip preset-chip yt-only" data-preset="discussed"
      title="100+ comments, by comments">💬 Discussions</button>
    <button class="chip preset-chip yt-only" data-preset="viral"
      title="Views significantly outpace channel subscribers">🎯 Viral</button>
    <button id="filters-reset" class="chip hidden">✖ Reset</button>
  </div>
  <div id="filters-panel" class="hidden">
    <label>Period
      <select id="f-period">
        <option value="">all time</option>
        <option value="7">7 days</option>
        <option value="30">30 days</option>
        <option value="90">90 days</option>
      </select>
    </label>
    <label>Views
      <select id="f-views">
        <option value="">any</option>
        <option value="lt10k">under 10K</option>
        <option value="mid">10K–100K</option>
        <option value="gt100k">100K+</option>
      </select>
    </label>
    <label class="yt-only">Comments
      <select id="f-comments">
        <option value="">any</option>
        <option value="10">10+</option>
        <option value="100">100+</option>
        <option value="1000">1000+</option>
      </select>
    </label>
    <label>Duration
      <select id="f-duration">
        <option value="">any</option>
        <option value="noshorts">no Shorts</option>
        <option value="lt4">under 4 min</option>
        <option value="4to20">4–20 min</option>
        <option value="gt20">20+ min</option>
      </select>
    </label>
    <label class="yt-only">Channels
      <select id="f-channel">
        <option value="">any</option>
        <option value="top">top (100K+ subs)</option>
        <option value="small">small (under 10K)</option>
        <option value="young">new (under 1 year)</option>
      </select>
    </label>
    <label>Sort
      <select id="f-sort">
        <option value="random">random</option>
        <option value="date">newest first</option>
        <option value="views">by views</option>
        <option value="comments">by comments</option>
        <option value="engagement">by engagement</option>
        <option value="velocity">by velocity</option>
      </select>
    </label>
  </div>

  <main>
    <!-- Skeleton loading -->
    <section id="loading" class="hidden">
      <div id="skeleton-grid" class="video-grid"></div>
    </section>

    <!-- Feed -->
    <section id="feed" class="hidden">
      <div id="video-grid" class="video-grid"></div>
    </section>
  </main>

  <!-- Player modal -->
  <div id="player-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <button id="modal-close" title="Close">✕</button>
      <div class="player-wrap">
        <iframe id="player-iframe" src="" title="Video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <div id="modal-title"></div>
        <div id="modal-channel"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
