<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaFeed — интернет глазами другого человека</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Topbar -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo-icon">▶</span>
      <span class="logo-text">PersonaFeed</span>
    </div>
    <div class="topbar-center">
      <div class="search-box">
        <input id="custom-input" type="text" placeholder="Чьими глазами смотреть? Например: пожарный, шеф-повар..." />
        <button id="custom-btn" title="Показать ленту">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <div id="persona-avatar" class="avatar hidden" title=""></div>
    </div>
  </header>

  <!-- Chips -->
  <nav id="chips-row"></nav>

  <!-- Persona banner -->
  <div id="persona-banner" class="hidden">
    <span id="banner-text"></span>
  </div>

  <main>
    <!-- Empty state -->
    <section id="empty-state">
      <h2>Посмотри на YouTube чужими глазами</h2>
      <p>Выбери персонажа сверху — и увидишь его ленту</p>
    </section>

    <!-- Skeleton loading -->
    <section id="loading" class="hidden">
      <div class="loading-note">Собираем ленту персонажа — первый запрос занимает до минуты…</div>
      <div id="skeleton-grid" class="video-grid"></div>
    </section>

    <!-- Feed -->
    <section id="feed" class="hidden">
      <div id="searches-block" class="hidden">
        <span class="searches-label">Персона искала:</span>
        <span id="searches-chips"></span>
      </div>
      <div id="video-grid" class="video-grid"></div>
      <div id="news-shelf" class="hidden">
        <h3 id="news-title">Новости</h3>
        <div id="news-row"></div>
      </div>
    </section>
  </main>

  <!-- Player modal -->
  <div id="player-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <button id="modal-close" title="Закрыть">✕</button>
      <div class="player-wrap">
        <iframe id="player-iframe" src="" title="YouTube player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <div id="modal-title"></div>
        <div id="modal-channel"></div>
        <div id="modal-why" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
