<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StumbleFeed — Escape your algorithm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
  <link rel="shortcut icon" href="favicon.ico" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <!-- Topbar -->
  <header id="topbar">
    <div class="topbar-left">
      <img src="favicon.svg" alt="" class="logo-img" width="28" height="28" />
      <div class="logo-block">
        <span class="logo-text">StumbleFeed</span>
        <span class="logo-tagline">Escape your algorithm</span>
      </div>
    </div>
    <div class="topbar-center">
      <button id="new-feed-btn" class="hidden" title="Get a new shuffled feed">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        Shuffle Feed
      </button>
    </div>
    <div class="topbar-right">
      <div id="source-toggle" class="hidden">
        <button id="src-youtube" class="src-btn active">▶ YouTube</button>
        <button id="src-ru" class="src-btn">VK · RuTube</button>
      </div>
    </div>
  </header>

  <!-- Slogan bar -->
  <div id="slogan-bar" class="hidden">
    Step outside your infobubble, every day. Watch what you choose, not what the algorithm chooses for you.
  </div>

  <!-- Toolbar -->
  <div id="toolbar" class="hidden">
    <div id="topics-compact" class="compact-selector" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
      <span class="compact-label">Topics</span>
      <span id="topics-summary"></span>
      <svg class="chevron-icon" id="topics-chevron-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div id="presets-compact" class="compact-selector" role="button" tabindex="0" aria-haspopup="true" aria-expanded="false">
      <span class="compact-label">Presets</span>
      <span id="presets-summary"></span>
      <svg class="chevron-icon" id="presets-chevron-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <!-- Topics flyout (full-width panel) -->
  <div id="topics-flyout" class="topics-flyout hidden">
    <div class="flyout-actions">
      <button id="topics-select-all" class="chip">Select All</button>
      <button id="topics-clear" class="chip">Clear</button>
    </div>
    <div id="category-grid"></div>
  </div>

  <!-- Presets flyout (dropdown) -->
  <div id="presets-flyout" class="presets-flyout hidden">
    <div id="presets-grid"></div>
  </div>

  <main>
    <!-- Skeleton loading -->
    <section id="loading" class="hidden">
      <div id="skeleton-grid" class="video-grid"></div>
    </section>

    <!-- Feed -->
    <section id="feed" class="hidden">
      <div id="video-grid" class="video-grid"></div>
    </section>
  </main>

  <!-- Player modal -->
  <div id="player-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <button id="modal-close" title="Close">✕</button>
      <div class="player-wrap">
        <iframe id="player-iframe" src="" title="Video player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <div id="modal-title"></div>
        <div id="modal-channel"></div>
      </div>
    </div>
  </div>

  <script src="app.js?v=4"></script>
</body>
</html>
