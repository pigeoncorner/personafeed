<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaFeed — выйди из своего пузыря</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Topbar -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo-icon">▶</span>
      <span class="logo-text">PersonaFeed</span>
    </div>
    <div class="topbar-center">
      <div class="search-box">
        <input id="custom-input" type="text" placeholder="Своя тема: «пчеловодство», «стеклодувы»…" />
        <button id="custom-btn" title="Показать ленту">🔍</button>
      </div>
    </div>
    <div class="topbar-right">
      <button id="surprise-btn" class="hidden" title="Случайная тема из твоих категорий">🎲 Удиви меня</button>
    </div>
  </header>

  <!-- Chips -->
  <nav id="chips-row" class="hidden"></nav>

  <!-- Topic banner -->
  <div id="topic-banner" class="hidden">
    <span id="banner-text"></span>
  </div>

  <main>
    <!-- Onboarding: category selection -->
    <section id="onboarding" class="hidden">
      <h2>Выбери свои категории</h2>
      <p class="onboarding-sub">По ним мы будем находить неожиданный контент. Минимум одна.</p>
      <div id="category-grid"></div>
      <button id="onboarding-continue" disabled>Продолжить</button>
    </section>

    <!-- Empty state -->
    <section id="empty-state" class="hidden">
      <h2>Готово!</h2>
      <p>Жми «🎲 Удиви меня» или выбери категорию сверху</p>
    </section>

    <!-- Skeleton loading -->
    <section id="loading" class="hidden">
      <div class="loading-note" id="loading-note">Придумываем неожиданную тему…</div>
      <div id="skeleton-grid" class="video-grid"></div>
    </section>

    <!-- Feed -->
    <section id="feed" class="hidden">
      <div id="searches-block" class="hidden">
        <span class="searches-label">Что искали:</span>
        <span id="searches-chips"></span>
      </div>
      <div id="video-grid" class="video-grid"></div>
      <div id="news-shelf" class="hidden">
        <h3 id="news-title">Новости</h3>
        <div id="news-row"></div>
      </div>
    </section>
  </main>

  <!-- Player modal -->
  <div id="player-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <button id="modal-close" title="Закрыть">✕</button>
      <div class="player-wrap">
        <iframe id="player-iframe" src="" title="YouTube player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <div id="modal-title"></div>
        <div id="modal-channel"></div>
        <div id="modal-why" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
