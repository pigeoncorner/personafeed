<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PersonaFeed — выйди из своего пузыря</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Topbar -->
  <header id="topbar">
    <div class="topbar-left">
      <span class="logo-icon">▶</span>
      <span class="logo-text">PersonaFeed</span>
    </div>
    <div class="topbar-right">
      <button id="surprise-btn" class="hidden" title="Перетасовать ленту">🎲 Удиви меня</button>
    </div>
  </header>

  <!-- Chips -->
  <nav id="chips-row" class="hidden"></nav>

  <main>
    <!-- Onboarding: category selection -->
    <section id="onboarding" class="hidden">
      <h2>Выбери свои категории</h2>
      <p class="onboarding-sub">По ним мы будем находить неожиданный контент. Минимум одна.</p>
      <div id="category-grid"></div>
      <button id="onboarding-continue" disabled>Продолжить</button>
    </section>

    <!-- Skeleton loading -->
    <section id="loading" class="hidden">
      <div id="skeleton-grid" class="video-grid"></div>
    </section>

    <!-- Feed -->
    <section id="feed" class="hidden">
      <div id="video-grid" class="video-grid"></div>
    </section>
  </main>

  <!-- Player modal -->
  <div id="player-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-dialog">
      <button id="modal-close" title="Закрыть">✕</button>
      <div class="player-wrap">
        <iframe id="player-iframe" src="" title="YouTube player" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen></iframe>
      </div>
      <div class="modal-info">
        <div id="modal-title"></div>
        <div id="modal-channel"></div>
        <div id="modal-why" class="hidden"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
